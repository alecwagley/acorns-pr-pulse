name: Daily PR Refresh

on:
  schedule:
    # 16:00 UTC = 12pm ET during EDT (March-November), 11am ET during EST.
    # ET is the working time zone for the Acorns PR team in NYC.
    - cron: "0 16 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt

      - name: Collect items (Google News + SEC EDGAR)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 pipeline/collect.py

      - name: Regenerate dashboard HTML
        run: python3 pipeline/generate.py

      - name: Commit + push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ dashboard/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Daily refresh $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Send daily email to Jinny
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 pipeline/notify.py
