name: Daily PR Refresh (manual fallback)

# Primary daily refresh runs as a Claude Code routine at 12pm ET. This workflow
# is kept as a manual-dispatch fallback for cases where the routine fails and
# you want to force a refresh by hand from the GitHub UI.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt

      - name: Collect items (Google News + SEC EDGAR)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 pipeline/collect.py

      - name: Regenerate dashboard HTML
        run: python3 pipeline/generate.py

      - name: Commit + push if data changed
        run: |
          git config user.name "alecwagley"
          git config user.email "alec@vscrl.co"
          git add data/ dashboard/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Daily refresh $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Slack alert on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "No SLACK_WEBHOOK_URL set; skipping Slack alert. GitHub will still email the repo owner on failure (default)."
            exit 0
          fi
          # GH context provides the run URL so we can deep-link to the failure logs.
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD=$(cat <<EOF
          {
            "text": ":warning: Acorns PR Pulse daily run FAILED on $(date -u +%Y-%m-%d)\nCheck logs: $RUN_URL"
          }
          EOF
          )
          curl -sS -X POST -H 'Content-Type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
