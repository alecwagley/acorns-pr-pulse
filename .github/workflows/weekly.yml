name: Weekly PR Refresh

on:
  schedule:
    # Mondays at 11:00 UTC (7am ET during EDT, 6am ET during EST)
    - cron: "0 11 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt

      - name: Collect items (Google News + SEC EDGAR)
        run: python3 pipeline/collect.py

      - name: Regenerate dashboard HTML
        run: python3 pipeline/generate.py

      - name: Commit + push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ dashboard/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Weekly refresh $(date -u +%Y-%m-%d)"
            git push
          fi
